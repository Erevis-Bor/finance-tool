<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Money Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#1f1f1f;--mut:#5c5c5c;--faint:#8a8a8a;--line:#e6e4df;--soft:#f0efec;
      --bg:#f6f5f2;--card:#fff;
      --blue:#16589f;--green:#1e6b34;--amber:#92560a;--red:#b3261e;--purple:#5b2d8c;
      --blue-bg:#edf3fa;--green-bg:#edf6ef;--amber-bg:#fbf2e3;--red-bg:#faedec;--purple-bg:#f3edfa;
    }
    body{background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);font-size:14px}
    input,select,button{font-family:inherit}
    input[type=number]::-webkit-inner-spin-button{opacity:.35}
    input:focus,select:focus{outline:2px solid var(--blue);outline-offset:1px;border-radius:4px}
    button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
    .page{max-width:980px;margin:0 auto;padding:26px 20px 90px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px}
    .lbl{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin:28px 0 10px}
    .lbl.first{margin-top:0}
    .sub{font-size:12px;color:var(--mut);line-height:1.5}
    .faint{color:var(--faint)}
    .num{font-variant-numeric:tabular-nums}
    .input{border:1px solid #d6d4cf;border-radius:6px;padding:6px 9px;font-size:13px;background:#fff;width:100%;color:var(--ink)}
    select.input{width:auto;cursor:pointer}
    .btn{border:1px solid #d6d4cf;background:#fff;border-radius:6px;padding:6px 13px;font-size:13px;cursor:pointer;color:var(--ink)}
    .btn:hover{border-color:#b3b0a9}
    .btn-primary{background:var(--blue);border:1px solid var(--blue);color:#fff;font-weight:600;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer}
    .btn-danger{background:var(--red);border:none;color:#fff;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-ghost{border:none;background:none;color:var(--mut);cursor:pointer;font-size:13px;padding:5px 8px}
    .btn-add{border:1px dashed #c5c2bb;background:none;border-radius:6px;padding:7px 14px;font-size:13px;color:var(--mut);cursor:pointer}
    .btn-add:hover{color:var(--blue);border-color:var(--blue)}
    .btn-x{background:none;border:none;color:#b9b6af;cursor:pointer;font-size:17px;line-height:1;padding:2px 7px;border-radius:4px}
    .btn-x:hover{color:var(--red);background:var(--red-bg)}
    .linklike{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0;text-decoration:underline}
    .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap}
    .pill-green{background:var(--green-bg);color:var(--green)}
    .pill-amber{background:var(--amber-bg);color:var(--amber)}
    .pill-red{background:var(--red-bg);color:var(--red)}
    .pill-blue{background:var(--blue-bg);color:var(--blue)}
    .pill-grey{background:var(--soft);color:var(--mut)}
    .pill-purple{background:var(--purple-bg);color:var(--purple)}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{padding:9px 12px;font-weight:600;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
    .tbl th.r,.tbl td.r{text-align:right}
    .tbl td{padding:8px 12px;border-bottom:1px solid var(--soft);vertical-align:middle}
    .tbl tbody tr:last-child td{border-bottom:none}
    .tbl tfoot td{border-top:1px solid var(--line);border-bottom:none;background:#fafaf8;font-weight:600;font-size:12px;padding:9px 12px}
    .tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tbl-scroll table{min-width:560px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .cards-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
    .stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
    .stat .l{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
    .stat .v{font-size:24px;font-weight:700;line-height:1.15}
    .stat .s{font-size:12px;color:var(--faint);margin-top:4px;line-height:1.4}
    .stat.blue{background:var(--blue-bg);border-color:#ccdcef}.stat.blue .v{color:var(--blue)}
    .stat.green{background:var(--green-bg);border-color:#cee5d4}.stat.green .v{color:var(--green)}
    .stat.amber{background:var(--amber-bg);border-color:#eedcba}.stat.amber .v{color:var(--amber)}
    .stat.red{background:var(--red-bg);border-color:#efd1ce}.stat.red .v{color:var(--red)}
    .chip{padding:7px 15px;border-radius:99px;border:1px solid #d6d4cf;background:#fff;font-size:13px;cursor:pointer;color:var(--mut)}
    .chip.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
    .hero-input{font-size:32px;font-weight:700;border:none;background:transparent;outline:none;border-bottom:2px dashed #c5c2bb;color:var(--ink);width:150px;line-height:1.1;border-radius:0}
    .hero-input:focus{border-bottom:2px solid var(--blue);outline:none}
    .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
    .topbar-in{max-width:980px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:6px;height:56px}
    .brand{font-weight:700;font-size:14px;margin-right:10px;white-space:nowrap}
    .navbtn{border:none;background:none;font-size:14px;padding:8px 14px;color:var(--mut);cursor:pointer;border-radius:8px;white-space:nowrap}
    .navbtn.on{background:var(--ink);color:#fff;font-weight:600}
    .saved-flash{animation:savedFade 1.8s ease forwards;font-size:12px;color:var(--green);font-weight:500;white-space:nowrap}
    @keyframes savedFade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
    .bar-track{background:var(--soft);border-radius:3px;height:6px;width:100%;overflow:hidden;display:flex}
    .freq-group,.seg-group{display:flex;border-radius:6px;border:1px solid #d6d4cf;overflow:hidden;flex-shrink:0}
    .freq-group button,.seg-group button{padding:5px 9px;font-size:11px;background:#fff;color:var(--faint);border:none;cursor:pointer;line-height:1.4}
    .freq-group button.on,.seg-group button.on{background:var(--blue);color:#fff;font-weight:600}
    @media(max-width:660px){
      .grid-2,.grid-3{grid-template-columns:1fr}
      .cards-auto{grid-template-columns:1fr 1fr}
      .page{padding:18px 12px 100px}
      .topbar-in{overflow-x:auto}
    }
    @media(prefers-reduced-motion:reduce){.saved-flash{animation:none}}
    /* ── Lane colours & money flow ── */
    :root{
      --you:#16589f;--you-bg:#e9f1fa;--you-soft:#cfe0f3;
      --partner:#8a2f62;--partner-bg:#f9edf4;--partner-soft:#eed2e2;
      --joint:#46525e;--joint-bg:#eef1f4;--joint-soft:#d9e0e6;
    }
    .flow-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .flow-card{background:#fff;border:1px solid var(--line);border-top:3px solid var(--line);border-radius:12px;padding:15px 17px;position:relative;transition:border-color .12s,box-shadow .12s}
    .flow-card.click{cursor:pointer}
    .flow-card.click:hover{border-color:#aeaba4;border-top-color:inherit}
    .flow-card.sel{box-shadow:0 0 0 1.5px var(--ink);border-color:var(--ink)}
    .lane-tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .edit-hint{font-size:11px;color:var(--faint);white-space:nowrap}
    .flow-connector{display:block;width:100%}
    .split-btn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid #d6d4cf;border-radius:99px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mut);white-space:nowrap}
    .split-btn:hover{border-color:#aeaba4;color:var(--ink)}
    .split-btn.on{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
    .editor-panel{background:#fff;border:1.5px solid var(--ink);border-radius:12px;padding:18px 20px;margin:12px 0;animation:panelIn .16s ease}
    @keyframes panelIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
    .kv{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;padding:2.5px 0}
    .pgoal{border-bottom:1px solid var(--soft);padding:10px 0}
    .pgoal:last-of-type{border-bottom:none}
    @media(max-width:660px){
      .flow-card{padding:11px 12px}
      .flow-grid{gap:9px}
      .hero-input{font-size:24px;width:110px}
      .editor-panel{padding:14px 12px}
    }
    @media(prefers-reduced-motion:reduce){.editor-panel{animation:none}}

    /* ==================== GLASS THEME · demo v1 ==================== */
    :root{
      --ink:#15162e;--mut:#4a4c72;--faint:#8688ad;
      --line:rgba(30,30,70,.12);--soft:rgba(30,30,70,.055);
      --bg:#e9ecff;--card:rgba(255,255,255,.72);
      --blue:#5b54e6;--green:#0e9e77;--amber:#b06a12;--red:#e0447a;--purple:#7c5cff;
      --blue-bg:rgba(91,84,230,.12);--green-bg:rgba(14,158,119,.14);--amber-bg:rgba(176,106,18,.14);--red-bg:rgba(224,68,122,.13);--purple-bg:rgba(124,92,255,.13);
      --you:#5b54e6;--you-bg:rgba(91,84,230,.12);--you-soft:rgba(91,84,230,.30);
      --partner:#e0447a;--partner-bg:rgba(224,68,122,.12);--partner-soft:rgba(224,68,122,.30);
      --joint:#0e9e77;--joint-bg:rgba(14,158,119,.12);--joint-soft:rgba(14,158,119,.30);
      --glass-brd:1px solid rgba(255,255,255,.66);
      --glass-sh:0 22px 54px -30px rgba(40,30,110,.55);
    }
    body{
      background:
        radial-gradient(1100px 700px at 6% -10%, rgba(124,92,255,.40), transparent 60%),
        radial-gradient(1000px 720px at 102% -4%, rgba(224,68,122,.30), transparent 58%),
        radial-gradient(1200px 900px at 60% 122%, rgba(38,196,196,.34), transparent 60%),
        linear-gradient(158deg,#eef1ff 0%,#f4ecff 46%,#eafcff 100%);
      background-attachment:fixed;min-height:100vh;color:var(--ink);font-size:14.5px;letter-spacing:-.005em;
    }
    .page{max-width:1040px;padding:22px 20px 120px}
    .card,.stat,.tbl-wrap,.flow-card,.editor-panel{
      background:var(--card);border:var(--glass-brd);
      -webkit-backdrop-filter:blur(22px) saturate(1.6);backdrop-filter:blur(22px) saturate(1.6);
      border-radius:18px;box-shadow:var(--glass-sh)}
    .card{padding:20px 22px}
    .stat{padding:16px 18px;border-radius:16px}
    .stat .l{color:var(--mut)} .stat .v{font-size:28px;font-weight:700;letter-spacing:-.02em} .stat .s{color:var(--faint)}
    .flow-card{border-top:none;border-radius:16px}
    .flow-card.click:hover{border-color:rgba(91,84,230,.5)}
    .flow-card.sel{box-shadow:0 0 0 2px var(--blue),var(--glass-sh);border-color:transparent}
    .editor-panel{border:1.5px solid rgba(91,84,230,.55);border-radius:18px}
    .tbl th,.tbl td{border-color:var(--line)} .tbl tfoot td{background:rgba(255,255,255,.5);border-top-color:var(--line)}
    .lbl{color:var(--mut)}
    .input{background:rgba(255,255,255,.82);border:1px solid rgba(30,30,70,.16);border-radius:10px;padding:8px 11px;font-size:13.5px}
    .hero-input{border-bottom:2px solid rgba(91,84,230,.4)} .hero-input:focus{border-bottom-color:var(--blue)}
    .btn{background:rgba(255,255,255,.78);border:1px solid rgba(30,30,70,.16);border-radius:10px;padding:8px 15px;font-weight:600;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
    .btn:hover{border-color:var(--blue);color:var(--blue)}
    .btn-primary{background:linear-gradient(135deg,#6a5cff,#8a4dff);border:none;border-radius:11px;padding:9px 18px;box-shadow:0 12px 26px -12px rgba(106,92,255,.9)}
    .btn-primary:hover{filter:brightness(1.06)}
    .btn-danger{background:linear-gradient(135deg,#f0567f,#e0447a);border:none;border-radius:9px}
    .btn-add{border:1px dashed rgba(91,84,230,.5);border-radius:10px}
    .btn-add:hover{color:var(--blue);border-color:var(--blue);background:rgba(91,84,230,.06)}
    .linklike{color:var(--blue)}
    .topbar{background:rgba(255,255,255,.58);-webkit-backdrop-filter:blur(20px) saturate(1.5);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,.6);top:59px}
    .topbar-in{max-width:1040px;height:54px}
    .navbtn{border-radius:10px;font-weight:500} .navbtn.on{background:linear-gradient(135deg,#6a5cff,#8a4dff);color:#fff}
    .chip{background:rgba(255,255,255,.8);border:1px solid rgba(30,30,70,.16)} .chip.on{background:linear-gradient(135deg,#6a5cff,#8a4dff);border-color:transparent;color:#fff}
    .freq-group,.seg-group{border-radius:10px;border-color:rgba(30,30,70,.16);background:rgba(255,255,255,.6)}
    .freq-group button,.seg-group button{background:transparent} .freq-group button.on,.seg-group button.on{background:var(--blue)}
    .bar-track{height:8px;border-radius:99px;background:rgba(30,30,70,.09)}
    .pill{font-size:11.5px;padding:4px 11px} .saved-flash{color:var(--green)}
    .demobar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.52);-webkit-backdrop-filter:blur(26px) saturate(1.7);backdrop-filter:blur(26px) saturate(1.7);border-bottom:1px solid rgba(255,255,255,.6);box-shadow:0 12px 34px -26px rgba(40,30,110,.6)}
    .demobar-in{max-width:1040px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
    .demobar-brand{display:flex;align-items:center;gap:12px;min-width:0}
    .demobar-dot{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,#6a5cff,#e0447a 58%,#26c4c4);box-shadow:0 8px 18px -6px rgba(106,92,255,.8);flex:0 0 auto}
    .demobar-title{font-weight:700;font-size:18px;letter-spacing:-.02em;line-height:1}
    .demobar-tag{font-size:12px;color:var(--mut);margin-top:3px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .demobar-actions{margin-left:auto;display:flex;gap:10px;flex:0 0 auto}
    .demo-btn{font-size:14.5px;font-weight:700;border-radius:12px;padding:11px 20px;cursor:pointer;white-space:nowrap;border:none;transition:transform .12s,filter .12s}
    .demo-btn.primary{background:linear-gradient(135deg,#6a5cff,#8a4dff);color:#fff;box-shadow:0 14px 30px -12px rgba(106,92,255,.95)}
    .demo-btn.primary:hover{transform:translateY(-1px);filter:brightness(1.06)}
    .demo-btn.ghost{background:rgba(255,255,255,.82);color:var(--ink);border:1px solid rgba(30,30,70,.14)}
    .demo-btn.ghost:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px)}
    @media(max-width:660px){
      .demobar-in{padding:10px 14px;gap:10px} .demobar-tag{display:none}
      .demo-btn{padding:10px 14px;font-size:13.5px} .topbar{top:55px} .page{max-width:100%} .stat .v{font-size:24px}
    }
    @media(prefers-reduced-motion:reduce){.demo-btn{transition:none}}
  </style>
</head>

<script>
const {
  useState,
  useMemo,
  useEffect,
  useRef
} = React;
const h = React.createElement;

/* ── Formatting helpers ─────────────────────────────────────────────────── */
const gbp = n => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const s = Math.abs(Math.round(n)).toLocaleString("en-GB");
  return (n < 0 ? "−£" : "£") + s;
};
const gbp2 = n => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return (n < 0 ? "−£" : "£") + Math.abs(n).toLocaleString("en-GB", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
};
const parseDate = str => {
  if (!str) return null;
  const d = new Date(str + "T00:00:00");
  d.setDate(1);
  return isNaN(d) ? null : d;
};
const addMonths = (d, n) => {
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  r.setDate(1);
  return r;
};
const monthKey = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const nowKey = () => monthKey(new Date());
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmtMonth = d => d.toLocaleDateString("en-GB", {
  month: "short",
  year: "numeric"
});
const fmtMonthLong = mk => {
  const [y, m] = mk.split("-");
  return new Date(y, m - 1, 1).toLocaleDateString("en-GB", {
    month: "long",
    year: "numeric"
  });
};
const fmtDate = str => {
  if (!str) return "";
  const d = new Date(str);
  return isNaN(d) ? "" : d.toLocaleDateString("en-GB", {
    day: "numeric",
    month: "short"
  });
};
const monthsBefore = (key, n) => {
  const [y, m] = key.split("-").map(Number);
  return monthKey(new Date(y, m - 1 - n, 1));
};
const moToDeadline = dl => {
  if (!dl) return 1;
  const today = new Date();
  today.setDate(1);
  const d = parseDate(dl);
  if (!d || d <= today) return 1;
  return Math.max(1, (d.getFullYear() - today.getFullYear()) * 12 + (d.getMonth() - today.getMonth()));
};
const uniq = a => [...new Set(a)];
const num = v => {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
};
const COLORS = ["#16589f", "#1e6b34", "#5b2d8c", "#b35309", "#a82424", "#00707e", "#5d4037", "#4e7022", "#a3275f", "#37474f"];
const goalColor = id => COLORS[(id - 1 + COLORS.length * 100) % COLORS.length];
const BILL_CATS = ["Housing", "Utilities", "Living", "Transport", "Insurance", "Subscriptions", "Other"];
const PERS_CATS = ["Food & Drink", "Shopping", "Transport", "Health", "Fun", "Other"];

/* ── Money model helpers ────────────────────────────────────────────────── */
const billMo = b => b.freq === "annual" ? b.amount / 12 : b.amount;
const itemMo = it => {
  const kids = it.subitems && it.subitems.length > 0;
  if (kids) return it.subitems.reduce((s, si) => s + (si.freq === "annual" ? si.amount / 12 : si.freq === "weekly" ? si.amount * 4 : si.amount), 0);
  return it.freq === "weekly" ? it.budget * 4 : it.freq === "annual" ? it.budget / 12 : it.budget;
};
const COMMITTED_BILL_CATS = new Set(["Housing", "Utilities", "Insurance"]);
const COMMITTED_PERS_CATS = new Set(["Transport", "Health"]);
const commitType = (item, isBill = false) => item.commitType || (isBill ? COMMITTED_BILL_CATS.has(item.cat) ? "committed" : "lifestyle" : COMMITTED_PERS_CATS.has(item.cat) ? "committed" : "lifestyle");

/* ── Savings challenge engine (daily deposits, daily interest accrual) ──── */
function simulateChallenge(c) {
  if (!c.startDate || !c.endDate || !c.increment) return null;
  const start = new Date(c.startDate + "T00:00:00");
  const end = new Date(c.endDate + "T00:00:00");
  if (isNaN(start) || isNaN(end) || end <= start) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const aer = (c.aer || 0) / 100;
  const dailyRate = Math.pow(1 + aer, 1 / 365) - 1;
  const inc = c.increment || 1;
  const daysTotal = Math.round((end - start) / 86400000) + 1;
  const daysElapsed = Math.max(0, Math.min(daysTotal, Math.round((today - start) / 86400000) + 1));
  const useOverride = (c.currentBalance || 0) > 0;
  function runSim(fromDate, fromBal, fromDayNum, toDate) {
    let bal = fromBal,
      accrued = 0,
      d = new Date(fromDate),
      dn = fromDayNum;
    while (d <= toDate) {
      if (d.getDate() === 1 && d > fromDate && accrued > 0) {
        bal += accrued;
        accrued = 0;
      }
      bal += inc * dn / 100;
      accrued += bal * dailyRate;
      d.setDate(d.getDate() + 1);
      dn++;
    }
    return bal + accrued;
  }
  let balToday = useOverride ? c.currentBalance : runSim(start, 0, 1, today <= end ? today : end);
  let projectedFinal;
  if (today >= end) projectedFinal = balToday;else {
    const projStart = new Date(today);
    projStart.setDate(projStart.getDate() + 1);
    projectedFinal = runSim(projStart, balToday, daysElapsed + 1, end);
  }
  const totalContribs = inc / 100 * (daysTotal * (daysTotal + 1) / 2);
  const months = Math.max(1, (end - start) / (86400000 * 30.44));
  return {
    balanceToday: Math.round(balToday * 100) / 100,
    projectedFinal: Math.round(projectedFinal * 100) / 100,
    totalContributions: Math.round(totalContribs * 100) / 100,
    interestEarned: Math.round((projectedFinal - totalContribs) * 100) / 100,
    daysTotal,
    daysElapsed,
    monthlyContrib: Math.round(totalContribs / months * 100) / 100,
    pctComplete: Math.round(daysElapsed / daysTotal * 100),
    complete: today >= end
  };
}
/* Actual cost of a challenge in a given calendar month (the ramp is real). */
function challengeMonthCost(c, mk) {
  if (!c.startDate || !c.endDate || !c.increment) return 0;
  const start = new Date(c.startDate + "T00:00:00"),
    end = new Date(c.endDate + "T00:00:00");
  if (isNaN(start) || isNaN(end)) return 0;
  const [y, m] = mk.split("-").map(Number);
  const mStart = new Date(y, m - 1, 1),
    mEnd = new Date(y, m, 0);
  let d = new Date(Math.max(start, mStart));
  const last = new Date(Math.min(end, mEnd));
  let total = 0;
  while (d <= last) {
    const dayNum = Math.round((d - start) / 86400000) + 1;
    total += c.increment * dayNum / 100;
    d.setDate(d.getDate() + 1);
  }
  return total;
}

/* Unified goal model.
   goal: { id, name, owner: joint|you|partner, funding: pool|monthly|challenge,
           target, fundedSoFar, deadline, archived,
           (itemised joint goals only:) parts:[{id,name,amount,deadline}],
           (challenge only:) increment, aer, startDate, endDate, currentBalance }
   A pool goal is either a single target+deadline, or a set of dated parts.
   When parts exist, target = sum of parts and deadline = latest part. The pool
   funds each part as its own dated claim; fundedSoFar is applied in date order. */
const goalNeed = g => Math.max(0, (g.target || 0) - (g.fundedSoFar || 0));
const pgMonthly = g => {
  if (!g.target || !g.deadline) return 0;
  return Math.ceil(goalNeed(g) / moToDeadline(g.deadline));
};
